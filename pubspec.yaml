name: claude_stats
description: "A minimal, Claude-themed macOS widget that tracks your Claude.ai usage limits."
publish_to: 'none'
version: 1.1.2+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Desktop window control: hidden title bar w/ traffic lights, always-on-top,
  # sizing, drag-to-move.
  window_manager: ^0.5.1

  # App-private storage for the Claude sessionKey + settings + history,
  # written to the sandbox container (no fragile Keychain entitlements).
  path_provider: ^2.1.5

  # Claude.ai usage API.
  http: ^1.2.2

  # Reset-countdown / clock formatting (12h / 24h).
  intl: ^0.20.2

  # Claude-family typography: Hanken Grotesk for UI (a clean stand-in for
  # Claude's "Styrene"), JetBrains Mono for technical readouts.
  google_fonts: ^8.1.0

  # Best-effort desktop notifications at usage thresholds.
  local_notifier: ^0.1.6

  # Embedded claude.ai login (captures the sessionKey cookie automatically).
  flutter_inappwebview: ^6.1.5

  # Opens the GitHub release page in the default browser (update check).
  url_launcher: ^6.3.0

  # macOS menu-bar (NSStatusItem) residency: live usage % title + custom icon
  # + context menu, with click-to-toggle the window.
  tray_manager: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Test-only: deterministic timers (auto-refresh loop) + plugin platform fakes
  # (path_provider, url_launcher) used by the test harness.
  fake_async: ^1.3.3
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  assets:
    - assets/tray/
